[general]
# The governor parameter allows you to specify a CPU governor to use
# We use 'performance' for gaming to prevent CPU throttling
defaultgov=performance
desiredgov=performance

# If set to yes, game mode will block the screensaver/sleep when active
inhibit_screensaver=1

[custom]
# Run script hooks when gamemode starts or stops
start=notify-send "GameMode Started" "AeroOS performance profile active."
end=notify-send "GameMode Ended" "Default power saving profile restored."
