# AeroOS Kernel Performance & Latency Tweaks

# Reduce swappiness to keep more data in RAM (especially useful if zram is configured)
vm.swappiness = 10

# Increase virtual memory limits for heavy gaming/Wine (prevents out-of-memory crashes in games)
vm.max_map_count = 2147483642

# Optimize writeback cache behavior for disk writes to prevent desktop stutters during file I/O
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10

# Network tweaks for lower latency and better throughput
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Increase file descriptor limit
fs.file-max = 2097152
