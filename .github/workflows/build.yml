name: Build AeroOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso wget rsync curl

      - name: Run ISO Builder
        run: |
          chmod +x build-iso.sh aero-setup.sh
          sudo ./build-iso.sh

      - name: Upload Custom ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeroos-custom-iso
          path: aeroos-custom-24.04.iso
          compression-level: 0 # Don't re-compress the already compressed ISO file
